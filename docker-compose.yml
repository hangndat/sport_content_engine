services:
  db-init:
    build: .
    command: npm run db:init
    environment:
      DATABASE_URL: postgresql://user:password@postgres:5432/sport_content_engine
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # app:
  #   build: .
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     DATABASE_URL: postgresql://user:password@postgres:5432/sport_content_engine
  #     REDIS_URL: redis://redis:6379
  #     S3_ENDPOINT: http://minio:9000
  #     S3_ACCESS_KEY: minioadmin
  #     S3_SECRET_KEY: minioadmin
  #     S3_BUCKET: sport-content
  #     S3_REGION: us-east-1
  #     S3_USE_SSL: "false"
  #     PORT: "3000"
  #     NODE_ENV: production
  #   env_file:
  #     - .env
  #   depends_on:
  #     - postgres
  #     - redis
  #     - minio
  #   restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: sport_content_engine
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d sport_content_engine"]
      interval: 2s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "16379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

volumes:
  pgdata:
  miniodata:
